<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accesso staff · Masseria Sacramento</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="/assets/css/global.css">
<link rel="stylesheet" href="/assets/css/dashboard.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <a href="/" class="lockup">
      <span class="emblem" aria-hidden="true">
        <svg width="38" height="38" viewBox="0 0 64 64" fill="none">
          <rect x="6" y="7" width="52" height="51" rx="3" stroke="currentColor" stroke-width="2.4"/>
          <path d="M20 51 V32 a12 12 0 0 1 24 0 V51" stroke="currentColor" stroke-width="2.4"/>
          <line x1="14" y1="51" x2="50" y2="51" stroke="currentColor" stroke-width="2.4"/>
          <line x1="32" y1="11" x2="32" y2="18" stroke="currentColor" stroke-width="2.4"/>
        </svg>
      </span>
      <span class="lockup__txt"><span class="lockup__name">Festa della Birra</span><span class="lockup__sub">Area staff</span></span>
    </a>
    <h1>Accesso</h1>
    <p>Inserisci la password per gestire le prenotazioni.</p>
    <div class="field">
      <input type="password" id="p" placeholder="Password" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <div class="form-err" id="err"></div>
    <button class="btn btn--gold btn--block" onclick="doLogin()">Entra</button>
  </div>
</div>

<script type="module">
import { MS } from '/assets/js/storage.js';

if (sessionStorage.getItem('ms_auth') === '1') location.href = '/admin/dashboard';

await MS.loadCfg();

window.doLogin = () => {
  const pw = (MS.cfg().adminPw || 'sacramento2026');
  if (document.getElementById('p').value === pw) {
    sessionStorage.setItem('ms_auth', '1');
    location.href = '/admin/dashboard';
  } else {
    document.getElementById('err').textContent = 'Password errata. Riprova.';
  }
};
</script>
</body>
</html>
